name: Deploy Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      ENIG_CREDIT_ADDRESS: ${{ secrets.ENIG_CREDIT_ADDRESS }}
      MARKETPLACE_ADDRESS: ${{ secrets.MARKETPLACE_ADDRESS }}
      REPUTATION_ADDRESS: ${{ secrets.REPUTATION_ADDRESS }}
    steps:
      - uses: actions/checkout@v4
      - name: Inject deployment contract addresses
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          path = Path("frontend/src/shared/config.js")
          text = path.read_text()
          replacements = {
              "__ENIG_CREDIT_ADDRESS__": os.environ.get("ENIG_CREDIT_ADDRESS", "0x31627B4593B3384BD835889F1Df5473ebcbF0de5"),
              "__MARKETPLACE_ADDRESS__": os.environ.get("MARKETPLACE_ADDRESS", "0xA18A3852df23d161EfD8D7772CBdE9FA254905cb"),
              "__REPUTATION_ADDRESS__": os.environ.get("REPUTATION_ADDRESS", "0x64c9edB8e9f5d26508E750dd921E3C680e007A6C"),
          }
          for placeholder, value in replacements.items():
              text = text.replace(placeholder, value)
          path.write_text(text)
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "frontend/src"
      - id: deployment
        uses: actions/deploy-pages@v4
